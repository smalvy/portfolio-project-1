# Modified by smalvy, 2026 — adapted for portfolio-project-1
# More information about the configuration file can be found here:
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/serverless-sam-cli-config.html
version = 0.1

[default.global.parameters]
stack_name = "portfolio-project-1"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true

[default.package.parameters]
resolve_s3 = true

[default.sync.parameters]
watch = true

[default.local_start_api.parameters]
warm_containers = "EAGER"

[default.local_start_lambda.parameters]
warm_containers = "EAGER"


# LocalStack deploy
[localstack.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
resolve_s3 = false
s3_bucket = "awssamcli-managed-default"
s3_prefix = "portfolio-project-1"
region = "us-east-1"
stack_name = "portfolio-project-1"
# parameter to use for LocalStack deployment in local
# parameter_overrides = "AlertEmail=#INSERT NOTIFICATION E-MAIL ADDRESS#"


# AWS deploy
[aws.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "eu-south-1"
profile = "portfolio-deployer"
stack_name = "portfolio-project-1"
# parameter to use for AWS deployment on the cloud
# parameter_overrides = "AlertEmail=#INSERT NOTIFICATION E-MAIL ADDRESS#"